services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      BASE_URL: http://localhost:3000
      MONGO_URI: mongodb://mongo:27017/tinyurl
      REDIS_URL: redis://redis:6379
      REDIS_TTL_SECONDS: 3600
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    command: npm run worker
    environment:
      MONGO_URI: mongodb://mongo:27017/tinyurl
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis

volumes:
  mongo_data:
