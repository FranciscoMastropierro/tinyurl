<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyURL</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: #f4f6f8;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.75rem;
      }

      .subtitle {
        margin: 0 0 1.5rem;
        color: #666;
        font-size: 0.95rem;
      }

      label {
        display: block;
        margin-bottom: 0.35rem;
        font-weight: 600;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        font-size: 1rem;
      }

      input:focus {
        outline: 2px solid #0969da;
        border-color: #0969da;
      }

      .field {
        margin-bottom: 1rem;
      }

      button {
        width: 100%;
        margin-top: 0.5rem;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 8px;
        background: #0969da;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #0550ae;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .message {
        margin-top: 1.25rem;
        padding: 0.85rem 1rem;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      .message.success {
        background: #dafbe1;
        color: #116329;
      }

      .message.error {
        background: #ffebe9;
        color: #cf222e;
      }

      .short-url {
        display: block;
        margin-top: 0.5rem;
        word-break: break-all;
        font-weight: 600;
      }

      .hint {
        margin-top: 0.35rem;
        font-size: 0.8rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>TinyURL</h1>
      <p class="subtitle">Acortá una URL y probá el redirect al instante.</p>

      <form id="form">
        <div class="field">
          <label for="url">URL original</label>
          <input
            id="url"
            name="url"
            type="url"
            required
            placeholder="https://example.com"
          />
        </div>

        <div class="field">
          <label for="alias">Alias (opcional)</label>
          <input
            id="alias"
            name="alias"
            type="text"
            placeholder="mi-alias"
            minlength="3"
            maxlength="32"
            pattern="[a-zA-Z0-9-_]+"
          />
          <p class="hint">3–32 caracteres: letras, números, guión y guión bajo.</p>
        </div>

        <button type="submit" id="submit">Crear TinyURL</button>
      </form>

      <div id="result" hidden></div>
      <div id="error" hidden></div>
    </main>

    <script>
      const form = document.getElementById('form');
      const submitBtn = document.getElementById('submit');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      function showResult(html) {
        result.hidden = false;
        result.className = 'message success';
        result.innerHTML = html;
        error.hidden = true;
      }

      function showError(message) {
        error.hidden = false;
        error.className = 'message error';
        error.textContent = message;
        result.hidden = true;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        result.hidden = true;
        error.hidden = true;

        const url = document.getElementById('url').value.trim();
        const alias = document.getElementById('alias').value.trim();
        const body = alias ? { url, alias } : { url };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creando...';

        try {
          const response = await fetch('/api/urls', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            showError(data.message || data.error || 'Error al crear la URL');
            return;
          }

          showResult(
            `Listo. Tu short URL:` +
              `<a class="short-url" href="${data.shortUrl}" target="_blank" rel="noopener">${data.shortUrl}</a>`,
          );
        } catch {
          showError('No se pudo conectar con el servidor');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Crear TinyURL';
        }
      });
    </script>
  </body>
</html>
